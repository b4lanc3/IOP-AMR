# twist_mux config — ưu tiên e-stop > teleop > nav2.
# Publish cmd_vel tổng hợp ra /cmd_vel_mux/output; bên diff_drive_controller sub topic này.

twist_mux:
  ros__parameters:
    topics:
      estop:
        topic: /cmd_vel_estop
        timeout: 0.1
        priority: 100
      teleop:
        topic: /cmd_vel          # app Flutter publish vào đây
        timeout: 0.3
        priority: 50
      nav2:
        topic: /cmd_vel_nav
        timeout: 0.5
        priority: 10
    output_topic: /cmd_vel_mux/output
