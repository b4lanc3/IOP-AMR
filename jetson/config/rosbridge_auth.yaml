# rosbridge_server config — dùng khi muốn bật auth + TLS.
# Mặc định bridge chạy open, LAN tin cậy.
# Khi bật auth, app Flutter cần gọi /rosauth/authenticate trước.

rosbridge_websocket:
  ros__parameters:
    port: 9090
    address: 0.0.0.0
    retry_startup_delay: 5.0
    fragment_timeout: 600
    delay_between_messages: 0.0
    max_message_size: 0            # 0 = không giới hạn
    unregister_timeout: 10.0
    use_compression: false
    call_service_timeout: 5.0
    send_action_goals_in_new_thread: true

    # Authentication (tắt mặc định)
    authenticate: false
    # topics_glob: ['*']
    # services_glob: ['*']
    # params_glob: ['*']

    # TLS (không khuyến nghị với self-signed cho app web)
    # certfile: /etc/ssl/certs/rosbridge.crt
    # keyfile:  /etc/ssl/private/rosbridge.key
