name: amr_control
description: "IOP-AMR control app — cross-platform controller, monitor and navigation UI for ROS2 AMRs."
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ROS2 bridge — dùng raw WebSocket (rosbridge v2) tự viết,
  # không dùng roslibdart vì chưa hỗ trợ action client.
  web_socket_channel: ^3.0.0

  # State & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Persistent storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network discovery
  multicast_dns: ^0.3.2

  # Input
  gamepads: ^0.1.2

  # Media
  flutter_mjpeg: ^2.0.0

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  collection: ^1.18.0
  logger: ^2.4.0
  intl: ^0.20.2
  uuid: ^4.4.2
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  msix: ^3.16.13

# path_provider_foundation 2.5+ depends on objective_c (native asset hooks).
# On Windows, those hooks invoke cmd without quoting paths that contain spaces
# (e.g. C:\Users\Tran Binh Minh\...), breaking `flutter build/run` with:
#   'C:\Users\Tran' is not recognized as an internal or external command
# 2.4.x uses Pigeon only — no objective_c — so builds work in profile dirs with spaces.
dependency_overrides:
  path_provider_foundation: 2.4.1

# Windows installer (.msix) — chạy: dart run msix:create (sau flutter build windows)
# File ra: build/windows/x64/runner/Release/*.msix hoặc thư mục dist/ (xem scripts/)
msix_config:
  display_name: IOP-AMR Control
  publisher_display_name: IOP-AMR
  identity_name: com.iopamr.amrcontrol
  msix_version: 1.0.0.0
  logo_path: assets/icons/app_logo.png
  capabilities: internetClient, privateNetworkClientServer
  architecture: x64
  output_path: dist
  output_name: IOP-AMR-Control-Setup
  # Không hỏi cài cert tương tác (CI / script). Đóng gói không ký — cài trên máy khác:
  # Settings → Developer → bật "App sideloading" hoặc ký bằng cert thật sau.
  install_certificate: false
  sign_msix: false
  publisher: CN=IOP-AMR Control

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
