name: amr_control
description: "IOP-AMR control app — cross-platform controller, monitor and navigation UI for ROS2 AMRs."
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ROS2 bridge
  roslibdart: ^0.1.4
  web_socket_channel: ^3.0.0

  # State & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Persistent storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network discovery
  multicast_dns: ^0.3.2

  # Input
  gamepads: ^0.1.2
  flutter_joystick: ^0.2.2

  # Media
  flutter_mjpeg: ^2.0.0

  # Charts & icons
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10+1

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0
  logger: ^2.4.0
  intl: ^0.19.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
